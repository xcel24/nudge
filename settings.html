<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 18px 20px 92px;
      font-family: -apple-system, "Segoe UI", sans-serif;
      color: #22323d; background: #f5fbff;
    }
    h1 { font-size: 18px; margin: 0 0 2px; }
    p.sub { margin: 0 0 16px; font-size: 12px; color: #6b8091; }

    .card {
      background: #fff; border: 1px solid #d9e7ef; border-radius: 12px;
      padding: 10px 12px; margin-bottom: 10px;
    }
    .head { display: flex; align-items: center; gap: 8px; }
    .f-emoji { width: 40px; text-align: center; font-size: 16px; }
    .f-name { flex: 1; font-weight: 600; }
    .del {
      border: none; background: transparent; color: #c0392b;
      border-radius: 8px; padding: 6px 8px; cursor: pointer; font-size: 15px;
    }
    .del:hover { background: #fbeaea; }

    /* Collapsed summary line — click to expand. */
    .summary {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 6px; padding: 2px 2px 0; font-size: 12px; color: #6b8091; cursor: pointer;
    }
    .chev { transition: transform .15s ease; color: #9bb0be; }
    .card.expanded .chev { transform: rotate(180deg); }

    .body { display: none; margin-top: 10px; }
    .card.expanded .body { display: block; }
    .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .row:last-child { margin-bottom: 0; }
    .card label { font-size: 12px; color: #5a6b78; display: flex; align-items: center; gap: 5px; white-space: nowrap; }

    input, select {
      border: 2px solid #cfe4ef; border-radius: 8px; background: #fff;
      padding: 6px 8px; font-size: 13px; color: #22323d;
    }
    input:focus, select:focus { outline: none; border-color: #79c7e3; }
    .f-goal, .f-every { width: 58px; text-align: center; }
    .f-mascot { flex: 0 0 132px; }
    .f-prompt { flex: 1; }

    .add {
      width: 100%; border: 2px dashed #a9d3e6; background: #eef8fd; color: #2b7fb0;
      border-radius: 10px; padding: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
      margin-bottom: 16px;
    }
    .add:hover { background: #e3f2fb; }

    .soundrow { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .soundrow input { width: 16px; height: 16px; }

    .actions {
      position: fixed; left: 0; right: 0; bottom: 0;
      display: flex; justify-content: flex-end; gap: 8px;
      padding: 12px 20px; background: #eef6fb; border-top: 1px solid #d9e7ef;
    }
    .actions button { border: none; border-radius: 10px; padding: 9px 18px; font-size: 14px; font-weight: 600; cursor: pointer; }
    #save { background: #4fbf7b; color: #fff; }
    #cancel { background: #e2e9ee; color: #556; }
    button:active { transform: scale(.97); }
  </style>
</head>
<body>
  <h1>⏰ Nudge</h1>
  <p class="sub">Tap a reminder to edit it.</p>

  <div id="list"></div>
  <button id="add" class="add">＋ Add reminder</button>

  <label class="soundrow"><input id="sound" type="checkbox" /> Sound effects</label>

  <div class="actions">
    <button id="cancel">Cancel</button>
    <button id="save">Save</button>
  </div>

  <template id="card-tpl">
    <div class="card">
      <div class="head">
        <input class="f-emoji" maxlength="2" />
        <input class="f-name" placeholder="Name (e.g. Water)" />
        <button class="del" title="Delete">🗑</button>
      </div>
      <div class="summary"><span class="sumtext"></span><span class="chev">▾</span></div>
      <div class="body">
        <div class="row">
          <label>Goal <input class="f-goal" type="number" min="1" max="20" /> ×/day</label>
          <label>Every <input class="f-every" type="number" min="5" max="1440" /> min</label>
        </div>
        <div class="row">
          <select class="f-mascot"></select>
          <input class="f-prompt" placeholder="What should I ask?" />
        </div>
      </div>
    </div>
  </template>

  <script src="settings.js"></script>
</body>
</html>
