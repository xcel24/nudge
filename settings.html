<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 22px 24px;
      font-family: -apple-system, "Segoe UI", sans-serif;
      color: #22323d;
      background: #f5fbff;
    }
    h1 { font-size: 17px; margin: 0 0 4px; }
    p.sub { margin: 0 0 18px; font-size: 12px; color: #6b8091; }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .row { display: flex; align-items: center; gap: 10px; }
    input[type="number"] {
      width: 80px; padding: 8px 10px; font-size: 15px;
      border: 2px solid #cfe4ef; border-radius: 10px; background: #fff;
    }
    input[type="number"]:focus { outline: none; border-color: #79c7e3; }
    .unit { font-size: 13px; color: #6b8091; }
    .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; }
    button {
      border: none; border-radius: 10px; padding: 9px 16px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    #save { background: #4fbf7b; color: #fff; }
    #cancel { background: #e7edf1; color: #556; }
    button:active { transform: scale(.97); }
  </style>
</head>
<body>
  <h1>💧 Settings</h1>
  <p class="sub">She'll remind you until you hit your daily goal.</p>

  <div class="field">
    <label for="goal">Glasses per day</label>
    <div class="row">
      <input id="goal" type="number" min="1" max="20" step="1" />
      <span class="unit">glasses</span>
    </div>
  </div>

  <div class="field">
    <label for="interval">Remind me every</label>
    <div class="row">
      <input id="interval" type="number" min="5" max="480" step="5" />
      <span class="unit">minutes</span>
    </div>
  </div>

  <div class="field">
    <label class="row" style="font-weight:600; cursor:pointer;">
      <input id="sound" type="checkbox" style="width:16px;height:16px;" />
      Sound effects
    </label>
  </div>

  <div class="actions">
    <button id="cancel">Cancel</button>
    <button id="save">Save</button>
  </div>

  <script src="settings.js"></script>
</body>
</html>
